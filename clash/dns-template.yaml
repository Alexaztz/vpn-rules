# Clash / Mihomo DNS template.
# Use this only in clients that support Clash DNS configuration.
# It helps reduce DNS pollution and DNS leakage.

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'

  # Primary DNS for proxied/global domains.
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  # Domestic DNS can be used by clients that support nameserver-policy.
  nameserver-policy:
    'geosite:cn':
      - 223.5.5.5
      - 119.29.29.29

  fallback:
    - https://1.0.0.1/dns-query
    - https://8.8.4.4/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
