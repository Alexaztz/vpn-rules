; subconverter external configuration
; Public rules only. Do not put VLESS links, UUIDs, tokens, panel paths, or private keys here.
; Usage pattern:
;   /sub?target=clash&url=<URL_ENCODED_SOURCE>&config=https%3A%2F%2Fraw.githubusercontent.com%2FAlexaztz%2Fvpn-rules%2Fmain%2Fsubconverter%2Fcustom.ini

[custom]
; ----- Direct first -----
ruleset=DIRECT,https://raw.githubusercontent.com/Alexaztz/vpn-rules/main/rules/system-direct.list
ruleset=DIRECT,https://raw.githubusercontent.com/Alexaztz/vpn-rules/main/rules/direct.list

; ----- Forced proxy -----
ruleset=PROXY,https://raw.githubusercontent.com/Alexaztz/vpn-rules/main/rules/ai.list
ruleset=PROXY,https://raw.githubusercontent.com/Alexaztz/vpn-rules/main/rules/google.list
ruleset=PROXY,https://raw.githubusercontent.com/Alexaztz/vpn-rules/main/rules/github.list
ruleset=PROXY,https://raw.githubusercontent.com/Alexaztz/vpn-rules/main/rules/streaming.list

; ----- Geo and final -----
ruleset=DIRECT,[]GEOIP,CN
ruleset=PROXY,[]FINAL

; ----- Proxy groups -----
custom_proxy_group=PROXY`select`.*
custom_proxy_group=DIRECT`select`[]DIRECT

; ----- Generator behavior -----
enable_rule_generator=true
overwrite_original_rules=true
